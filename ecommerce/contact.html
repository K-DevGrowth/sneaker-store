<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles.css" />
    <title>Contact</title>
  </head>
  <body>
    <header class="header flex">
      <div class="logo"><a href="../index.html">Khoi Sneaker Store</a></div>

      <nav>

          <li><a href="men.html">Men</a></li>

      <div class="header-actions">
        <button class="cart-btn" id="openCart">
          My Cart <span id="cartCount">0</span>
        </button>
      </div>
    </header>

    <main>
      <section class="contact-form">
        <h1 class="title-contact">Contact Us</h1>
        <p class="des-contact">Send us a message if you need support.</p>

        <form>
          <div class="flex-2">
            <div>
              <label>Name</label>
              <input type="text" placeholder="Your name" />
            </div>

            <div>
              <label>Email</label>
              <input type="email" placeholder="Your email" />
            </div>
          </div>

          <div>
            <label>Message</label>
            <textarea placeholder="Your message"></textarea>
          </div>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>
