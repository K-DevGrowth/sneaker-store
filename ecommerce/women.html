<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles.css" />
    <title>Women Shoes</title>
  </head>
  <body>
    <header class="header flex">
      <div class="logo"><a href="../index.html">Khoi Sneaker Store</a></div>

      <nav>
        <ul class="flex menu">
          <li><a href="men.html">Men</a></li>
          <li><a href="women.html">Women</a></li>
          <li><a href="kids.html">Kids</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="lab.html">Lab</a></li>
        </ul>
      </nav>

      <div class="header-actions">
        <button class="cart-btn" id="openCart">
          My Cart <span id="cartCount">0</span>
        </button>
      </div>
    </header>

    <main>
      <section class="product-list">
        <h2>Women's Shoes</h2>

        <div class="product-grid">
          <article class="product-card">
            <img
              src="../images/W-AIR-MAX-90-FUTURA.avif"
              alt="Air Max 90 Futura"
            />
            <div class="product-info">
              <p class="badge">Women</p>
              <h3>Nike Air Max 90 Futura</h3>
              <p class="category">Women's Shoes</p>
              <p class="price">4,100,000 VND</p>
              <button class="add-cart-btn">Add to Cart</button>
            </div>
          </article>

          <article class="product-card">
            <img
              src="../images/WMNS-AIR-JORDAN-1-MID.avif"
              alt="Air Jordan 1 Mid"
            />
            <div class="product-info">
              <p class="badge">Hot</p>
              <h3>Air Jordan 1 Mid</h3>
              <p class="category">Women's Shoes</p>
              <p class="price">3,669,000 VND</p>
              <button class="add-cart-btn">Add to Cart</button>
            </div>
          </article>
        </div>
      </section>
    </main>

    <aside class="cart-drawer" id="cartDrawer">
      <div class="cart-header flex">
        <h2>Your Cart</h2>
        <button id="closeCart">×</button>
      </div>

      <div id="cartItems"></div>

      <div class="cart-footer">
        <p>Total: <strong id="cartTotal">0 VND</strong></p>
        <button class="checkout-btn">Checkout</button>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <script src="../script.js"></script>
  </body>
</html>
